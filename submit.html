<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share - Trans Presence Matters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* Base body and typography */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #fdfbff 0%, #f7c6d9 50%, #a8d8f0 100%);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  color: #1a1a1a;
}

/* Animated bubbles background */
body::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
  animation: bubbleMove 30s linear infinite;
  z-index: 0;
}

@keyframes bubbleMove {
  0% { transform: translate(0,0) rotate(0deg); }
  100% { transform: translate(0,50px) rotate(360deg); }
}

/* Container */
.container {
  max-width: 720px;
  margin: auto;
  padding: 60px 20px;
  position: relative;
  z-index: 1;
}

/* Card */
.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(16px);
  border-radius: 25px;
  padding: 35px 30px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.08);
}

/* Headings */
h2 {
  font-weight: 500;
  font-size: 1.8rem;
  margin-bottom: 20px;
  text-align: center;
}

/* Form elements */
textarea, input {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 0.95rem;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

/* Submit button */
button {
  margin-top: 15px;
  padding: 10px 18px;
  font-size: 1rem;
  border: none;
  border-radius: 12px;
  background: #d46a9e;
  color: white;
  cursor: pointer;
  transition: transform 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* Thank you message */
#thanks {
  text-align: center;
  margin-top: 20px;
}

#thanks a {
  text-decoration: none;
  color: #2c3e50;
  font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: all 0.3s;
}

#thanks a:hover {
  color: #d46a9e;
  border-bottom: 2px solid #d46a9e;
}

/* Navigation */
.nav {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
  justify-content: center;
  flex-wrap: wrap;
  font-size: 0.95rem;
}

.nav a {
  text-decoration: none;
  opacity: 0.7;
  color: #1a1a1a;
  transition: opacity 0.3s, transform 0.3s;
}

.nav a:hover {
  opacity: 1;
  transform: scale(1.05);
}

/* Microcopy */
.note {
  font-size: 0.9rem;
  color: #555;
  margin-top: 8px;
  opacity: 0.8;
  line-height: 1.4;
}

/* Responsive */
@media(max-width: 480px){
  .card {
    padding: 25px 20px;
  }
  h2 {
    font-size: 1.5rem;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="read.html">Read</a>
    <a href="submit.html">Share</a>
    <a href="comment.html">Comment</a>
  </div>

  <div class="card">
    <h2>Say it as it exists for you</h2>
    <p class="note">
      Your experience matters. Sharing is a way to make presence visible. Silence leaves echoes, but your voice adds clarity and connection.
    </p>

    <form id="form">
      <textarea id="content" placeholder="Write your experience..." required></textarea>
      <input id="name" placeholder="Name (optional)">
      <button type="submit">Submit</button>
    </form>

    <div id="thanks" style="display:none;">
      <p>Received. It will sit here alongside others’ voices, visible when approved.</p>
      <a href="read.html">Read →</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
