<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share - Trans Presence Matters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #fdfbff 0%, #f7c6d9 50%, #a8d8f0 100%);
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 60px 20px;
}

.nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.nav a {
  text-decoration: none;
  color: #1a1a1a;
  opacity: 0.7;
}

.nav a:hover {
  opacity: 1;
}

.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(16px);
  border-radius: 25px;
  padding: 35px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  font-weight: 500;
}

.note {
  font-size: 0.9rem;
  opacity: 0.7;
  margin-bottom: 20px;
  text-align: center;
  line-height: 1.5;
}

textarea, input {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

textarea {
  min-height: 120px;
}

button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background: #d46a9e;
  color: white;
  cursor: pointer;
}

#thanks {
  display: none;
  text-align: center;
  margin-top: 20px;
}
</style>
</head>

<body>
<div class="container">

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="read.html">Read</a>
    <a href="submit.html">Share</a>
    <a href="comment.html">Comment</a>
  </div>

  <div class="card">
    <h2>Say it as it exists for you</h2>
    <p class="note">
      Presence becomes visible when it is shared. Silence carries its own weight — this space allows that weight to shift, one voice at a time.
    </p>

    <form id="form">
      <textarea id="content" placeholder="Write your experience..." required></textarea>
      <input id="name" placeholder="Name (optional)">
      <button type="submit">Submit</button>
    </form>

    <div id="thanks">
      <p>Received. It will sit here, and be made visible.</p>
      <a href="read.html">Read →</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // 🔴 REPLACE THESE
  const supabaseUrl = "https://hpafnpfhlbgcreotgbzn.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const form = document.getElementById("form");
  const thanks = document.getElementById("thanks");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const content = document.getElementById("content").value.trim();
    const name = document.getElementById("name").value.trim();

    if (!content) {
      alert("Write something first.");
      return;
    }

    try {
      const { data, error } = await supabase
        .from("submissions")
        .insert([{
          content: content,
          name: name,
          anonymous: name ? false : true,
          status: "pending"
        }]);

      console.log("RESPONSE:", data, error);

      if (error) {
        alert("Error: " + error.message);
        return;
      }

      form.style.display = "none";
      thanks.style.display = "block";

    } catch (err) {
      console.error("CRASH:", err);
      alert("Something broke. Check console.");
    }
  });

});
</script>

</body>
</html>
