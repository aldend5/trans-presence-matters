<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Share — Trans Presence Matters</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #f7c6d9 50%, #a8d8f0 100%);
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 700px;
      width: 100%;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    .intro {
      margin-bottom: 25px;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 15px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      outline: none;
      font-family: inherit;
    }

    .identity {
      margin-top: 20px;
      font-size: 0.95rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .checkbox {
      margin-top: 10px;
    }

    .consent {
      margin-top: 20px;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    button {
      margin-top: 25px;
      padding: 12px 20px;
      border: 1px solid #1a1a1a;
      background: none;
      cursor: pointer;
      border-radius: 20px;
    }

    button:hover {
      background: #1a1a1a;
      color: #fff;
    }

    .response {
      margin-top: 30px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Say it how it exists for you.</h1>

    <div class="intro">
      You don’t need to explain everything.<br>
      You don’t need to make it easier to understand.<br><br>
      Just something real enough to be felt.
    </div>

    <form id="submissionForm">

      <textarea 
        id="contentField"
        placeholder="What has been changing for you?"
        required>
      </textarea>

      <div class="identity">
        Name (optional)
        <input type="text" id="nameField" placeholder="Leave blank to stay anonymous">

        <div class="checkbox">
          <label>
            <input type="checkbox" id="anonymousToggle" checked>
            Stay anonymous
          </label>
        </div>
      </div>

      <div class="consent">
        Your words may be shared here to help others understand.
      </div>

      <button type="submit">Let this be seen</button>

    </form>

    <div class="response" id="responseMessage">
      Received. It will sit here, with others.
    </div>

  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://hpafnpfhlbgcreotgbzn.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE";

    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('submissionForm');
    const response = document.getElementById('responseMessage');
    const nameField = document.getElementById('nameField');
    const contentField = document.getElementById('contentField');
    const anonymousToggle = document.getElementById('anonymousToggle');

    nameField.disabled = true;

    anonymousToggle.addEventListener('change', () => {
      nameField.disabled = anonymousToggle.checked;
      if (anonymousToggle.checked) nameField.value = "";
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const content = contentField.value.trim();
      const name = nameField.value.trim();
      const anonymous = anonymousToggle.checked;

      if (!content) {
        alert("Write something first.");
        return;
      }

      const { error } = await supabaseClient
        .from('submissions')
        .insert([
          {
            content,
            name: anonymous ? null : name,
            anonymous,
            status: "pending"
          }
        ]);

      if (error) {
        alert(error.message);
        return;
      }

      form.style.display = "none";
      response.style.display = "block";
    });
  </script>

</body>
</html>
