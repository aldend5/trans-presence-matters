<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share - Trans Presence Matters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #fdfbff 0%, #f7c6d9 50%, #a8d8f0 100%);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  color: #1a1a1a;
}

/* Bubble background */
body::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
  animation: float 30s linear infinite;
  z-index: 0;
}

@keyframes float {
  0% { transform: translate(0,0) rotate(0deg); }
  100% { transform: translate(0,50px) rotate(360deg); }
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 60px 20px;
  position: relative;
  z-index: 1;
}

.nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.nav a {
  text-decoration: none;
  color: #1a1a1a;
  opacity: 0.7;
}

.nav a:hover {
  opacity: 1;
}

.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(16px);
  border-radius: 25px;
  padding: 35px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  font-weight: 500;
}

.note {
  font-size: 0.9rem;
  opacity: 0.7;
  margin-bottom: 20px;
  text-align: center;
}

textarea, input {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

textarea {
  min-height: 120px;
}

button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background: #d46a9e;
  color: white;
  cursor: pointer;
}

#thanks {
  display: none;
  text-align: center;
  margin-top: 20px;
}
</style>
</head>

<body>
<div class="container">

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="read.html">Read</a>
    <a href="submit.html">Share</a>
    <a href="comment.html">Comment</a>
  </div>

  <div class="card">
    <h2>Say it as it exists for you</h2>
    <p class="note">
      Presence becomes visible when it is shared. Silence carries weight too — this space allows it to shift.
    </p>

    <form id="form">
      <textarea id="content" placeholder="Write your experience..." required></textarea>
      <input id="name" placeholder="Name (optional)">
      <button type="submit">Submit</button>
    </form>

    <div id="thanks">
      <p>Received. It will sit here, and be made visible.</p>
      <a href="read.html">Read →</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>

<script>
const { Client, Databases, ID } = Appwrite;

const client = new Client()
  .setEndpoint("https://cloud.appwrite.io/v1")
  .setProject("YOUR_PROJECT_ID"); // 🔴 replace

const databases = new Databases(client);

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const content = document.getElementById("content").value.trim();
  const name = document.getElementById("name").value.trim();

  if (!content) return;

  try {
    await databases.createDocument(
      "YOUR_DATABASE_ID",   // 🔴 replace
      "submissions",        // collection ID
      ID.unique(),
      {
        content: content,
        name: name,
        status: "pending",
        createdAt: new Date().toISOString()
      }
    );

    document.getElementById("form").style.display = "none";
    document.getElementById("thanks").style.display = "block";

  } catch (err) {
    console.error("ERROR:", err);
    alert("Something broke — check console.");
  }
});
</script>

</body>
</html>
