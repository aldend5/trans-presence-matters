<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fafafa;
  color: #111;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  z-index: 1000;
}

.nav a {
  text-decoration: none;
  color: #333;
  transition: 0.2s;
}

.nav a:hover {
  color: red;
}

/* MAIN */
.container {
  max-width: 700px;
  margin: 100px auto;
  padding: 20px;
  text-align: center;
}

/* PANELS */
.card {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
  transition: 0.2s;
  text-align: left;
}

.card:hover {
  transform: translateY(-3px);
}

/* BUTTON */
.btn {
  padding: 8px 14px;
  border: 1px solid #ddd;
  cursor: pointer;
  background: white;
  margin: 5px;
}

.btn:hover {
  border-color: red;
  color: red;
}

/* TAG */
.tag {
  font-size: 12px;
  background: #eee;
  padding: 4px 8px;
  margin-right: 5px;
  border-radius: 5px;
}

/* REPLY */
.reply {
  margin-top: 10px;
  padding-left: 10px;
  border-left: 2px solid #eee;
  font-size: 14px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<div class="container">
  <h2>Add Your Presence</h2>

  <textarea id="text" style="width:100%; padding:10px;"></textarea><br><br>

  <input id="name" placeholder="Name (optional)" style="width:100%; padding:10px;"><br><br>

  <select id="tag" style="width:100%; padding:10px;">
    <option>Identity</option>
    <option>Discrimination</option>
    <option>Healthcare</option>
    <option>Family</option>
    <option>Work</option>
    <option>Safety</option>
    <option>Affirmation</option>
  </select><br><br>

  <button onclick="submitVoice()" class="btn">Submit</button>

  <p id="status"></p>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "YOUR_ANON_KEY"
);

async function submitVoice() {
  const { error } = await supabase.from("voices").insert([{
    text: text.value,
    name: name.value,
    tag: tag.value,
    status: "pending",
    likes: 0,
    dislikes: 0
  }]);

  status.innerText = error ? error.message : "Submitted for review.";
}
</script>
