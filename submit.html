<!DOCTYPE html>
<html>
<head>
  <title>Add Your Presence</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      width: 90%;
      max-width: 600px;
    }

    textarea, input {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      background: black;
      border: 1px solid red;
      color: white;
    }

    button {
      margin-top: 15px;
      padding: 10px 25px;
      border: 2px solid red;
      background: transparent;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: red;
    }

    h2 {
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>ADD YOUR PRESENCE</h2>

  <textarea id="text" placeholder="Write what needs to be seen..."></textarea>
  <input id="name" placeholder="Name (optional)">
  <input id="tag" placeholder="Tag">

  <button onclick="submitVoice()">SUBMIT</button>

  <p id="status"></p>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE"
);

async function submitVoice() {
  const text = document.getElementById("text").value;
  const name = document.getElementById("name").value;
  const tag = document.getElementById("tag").value;

  const { error } = await supabase
    .from("voices")
    .insert([{ text, name, tag, status: "pending" }]);

  document.getElementById("status").innerText =
    error ? error.message : "Submitted.";
}
</script>

</body>
</html>
