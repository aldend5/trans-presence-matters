<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fafafa;
  color: #111;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  z-index: 1000;
}

.nav a {
  text-decoration: none;
  color: #333;
  transition: 0.2s;
}

.nav a:hover {
  color: red;
}

/* MAIN */
.container {
  max-width: 700px;
  margin: 100px auto;
  padding: 20px;
  text-align: center;
}

/* PANELS */
.card {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
  transition: 0.2s;
  text-align: left;
}

.card:hover {
  transform: translateY(-3px);
}

/* BUTTON */
.btn {
  padding: 8px 14px;
  border: 1px solid #ddd;
  cursor: pointer;
  background: white;
  margin: 5px;
}

.btn:hover {
  border-color: red;
  color: red;
}

/* TAG */
.tag {
  font-size: 12px;
  background: #eee;
  padding: 4px 8px;
  margin-right: 5px;
  border-radius: 5px;
}

/* REPLY */
.reply {
  margin-top: 10px;
  padding-left: 10px;
  border-left: 2px solid #eee;
  font-size: 14px;
}
</style>

  <h2>Voices</h2>
  <div id="voices"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE"
);

async function loadVoices() {
  const { data } = await supabase
    .from("voices")
    .select("*")
    .eq("status", "approved")
    .order("id", { ascending: false });

  const container = document.getElementById("voices");

  data.forEach(v => {
    container.innerHTML += `
      <div class="card">
        <p>${v.text}</p>

        <span class="tag">${v.tag}</span>

        <div>
          <button class="btn" onclick="react(${v.id}, 'likes')">👍 ${v.likes}</button>
          <button class="btn" onclick="react(${v.id}, 'dislikes')">👎 ${v.dislikes}</button>
        </div>

        <div class="reply">
          <input placeholder="Reply..." onkeydown="if(event.key==='Enter') addReply(${v.id}, this.value)">
        </div>
      </div>
    `;
  });
}

async function react(id, field) {
  const { data } = await supabase.from("voices").select(field).eq("id", id).single();
  await supabase.from("voices").update({
    [field]: data[field] + 1
  }).eq("id", id);

  location.reload();
}

function addReply(id, text) {
  alert("Replies stored locally for now (next step we wire DB)");
}

loadVoices();
</script>
