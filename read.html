<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read - Trans Presence Matters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* Base body and typography */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #fdfbff 0%, #f7c6d9 50%, #a8d8f0 100%);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  color: #1a1a1a;
}

/* Animated bubbles background */
body::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
  animation: bubbleMove 30s linear infinite;
  z-index: 0;
}

@keyframes bubbleMove {
  0% { transform: translate(0,0) rotate(0deg); }
  100% { transform: translate(0,50px) rotate(360deg); }
}

/* Container */
.container {
  max-width: 720px;
  margin: auto;
  padding: 60px 20px;
  position: relative;
  z-index: 1;
}

/* Navigation */
.nav {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
  justify-content: center;
  flex-wrap: wrap;
  font-size: 0.95rem;
}

.nav a {
  text-decoration: none;
  opacity: 0.7;
  color: #1a1a1a;
  transition: opacity 0.3s, transform 0.3s;
}

.nav a:hover {
  opacity: 1;
  transform: scale(1.05);
}

/* Headings */
h2 {
  text-align: center;
  margin-bottom: 30px;
  font-weight: 500;
  font-size: 1.8rem;
}

/* Post cards */
.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(16px);
  border-radius: 25px;
  padding: 30px 25px;
  margin-bottom: 25px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.08);
}

/* Post content */
.card div, .card p {
  margin-bottom: 15px;
  line-height: 1.6;
  color: #333;
}

/* Author/anonymous */
.card .author {
  opacity: 0.6;
  font-size: 0.9rem;
}

/* Like button */
.card button {
  margin-left: 10px;
  padding: 5px 10px;
  font-size: 0.85rem;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  background: #d46a9e;
  color: white;
  transition: transform 0.2s;
}

.card button:hover {
  transform: scale(1.05);
}

/* Comment input */
.card input {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 0.95rem;
}

/* Responsive adjustments */
@media(max-width: 480px){
  .card {
    padding: 20px 15px;
  }
  h2 {
    font-size: 1.5rem;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="read.html">Read</a>
    <a href="submit.html">Share</a>
    <a href="comment.html">Comment</a>
  </div>

  <h2>Voices Being Heard</h2>
  <p style="text-align:center; opacity:0.7; margin-bottom:30px;">
    Every shared experience matters. Silence has consequences; every story adds weight to understanding. Visibility fosters connection and opens pathways for allies.
  </p>

  <div id="posts"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* 🔴 ADD YOUR SUPABASE DETAILS HERE */
const supabaseUrl = "https://hpafnpfhlbgcreotgbzn.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE";
/* 🔴 END */

const supabase = window.supabase.createClient2(supabaseUrl, supabaseKey);

async function loadPosts() {
  const { data: posts } = await supabase
    .from('submissions')
    .select('*')
    .eq('status','approved');

  const container = document.getElementById('posts');
  container.innerHTML = "";

  for (let post of posts) {
    const { data: likes } = await supabase
      .from('likes')
      .select('*')
      .eq('submission_id', post.id);

    const { data: comments } = await supabase
      .from('comments')
      .select('*')
      .eq('submission_id', post.id)
      .eq('status','approved');

    const el = document.createElement('div');
    el.className = "card";

    el.innerHTML = `
      <div>${post.content}</div>
      <div class="author">${post.anonymous ? "Anonymous" : (post.name || "")}</div>

      <div>❤️ ${likes.length} 
        <button onclick="likePost('${post.id}')">Like</button>
      </div>

      <div>
        ${comments.map(c => `<p>${c.content}</p>`).join("")}
      </div>

      <form onsubmit="addComment(event,'${post.id}')">
        <input placeholder="Respond thoughtfully..." required>
      </form>
    `;

    container.appendChild(el);
  }
}

async function likePost(id) {
  await supabase.from('likes').insert([{ submission_id: id }]);
  loadPosts();
}

async function addComment(e,id) {
  e.preventDefault();
  const content = e.target[0].value;

  await supabase.from('comments').insert([{
    submission_id: id,
    content,
    anonymous: true,
    status: "pending"
  }]);

  e.target.reset();
}

loadPosts();
</script>

</body>
</html>
