<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://hpafnpfhlbgcreotgbzn.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadPosts() {
  const { data, error } = await supabaseClient
    .from('submissions')
    .select('*')
    .eq('status', 'pending') // change to "approved" later
    .order('created_at', { ascending: false });

  const container = document.getElementById('posts');

  if (error) {
    container.innerHTML = "Unable to load right now.";
    return;
  }

  if (!data.length) {
    container.innerHTML = "Nothing here yet.";
    return;
  }

  container.innerHTML = data.map(post => `
    <div class="post">
      <div>${post.content}</div>
      <div class="name">${post.anonymous ? "Anonymous" : (post.name || "")}</div>
    </div>
  `).join('');
}

loadPosts();
</script>

</body>
