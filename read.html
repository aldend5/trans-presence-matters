<body>
<div class="container">

<div class="nav">

<h2>What is being said</h2>

<div id="posts"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* 🔴 ADD YOUR SUPABASE DETAILS HERE */
const supabaseUrl = "https://hpafnpfhlbgcreotgbzn.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDk0MDg4MywiZXhwIjoyMDkwNTE2ODgzfQ.EyD9QMVosTiKOyDMQml-T5Z8-UxTulVUcKaCZw5zL_k";
/* 🔴 END */

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadPosts() {
  const { data: posts } = await supabase
    .from('submissions')
    .select('*')
    .eq('status','approved');

  const container = document.getElementById('posts');
  container.innerHTML = "";

  for (let post of posts) {

    const { data: likes } = await supabase
      .from('likes')
      .select('*')
      .eq('submission_id', post.id);

    const { data: comments } = await supabase
      .from('comments')
      .select('*')
      .eq('submission_id', post.id)
      .eq('status','approved');

    const el = document.createElement('div');
    el.className = "card";

    el.innerHTML = `
      <div>${post.content}</div>
      <div style="opacity:0.6;margin-top:10px;">
        ${post.anonymous ? "Anonymous" : (post.name || "")}
      </div>

      <div>
        ❤️ ${likes.length}
        <button onclick="likePost('${post.id}')">Like</button>
      </div>

      <div>
        ${comments.map(c => `<p>${c.content}</p>`).join("")}
      </div>

      <form onsubmit="addComment(event,'${post.id}')">
        <input placeholder="Respond..." required>
      </form>
    `;

    container.appendChild(el);
  }
}

async function likePost(id) {
  await supabase.from('likes').insert([{ submission_id: id }]);
  loadPosts();
}

async function addComment(e,id) {
  e.preventDefault();
  const content = e.target[0].value;

  await supabase.from('comments').insert([{
    submission_id: id,
    content,
    anonymous: true,
    status: "pending"
  }]);

  e.target.reset();
}

loadPosts();
</script>

</body>
</html>
