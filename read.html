<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read - Trans Presence Matters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #fdfbff, #f7c6d9, #a8d8f0);
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 60px 20px;
}

.nav {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 40px;
}

.nav a {
  text-decoration: none;
  color: #1a1a1a;
  opacity: 0.7;
}

.card {
  background: rgba(255,255,255,0.85);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 20px;
}

.author {
  opacity: 0.6;
  font-size: 0.9rem;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="read.html">Read</a>
    <a href="submit.html">Share</a>
    <a href="comment.html">Comment</a>
  </div>

  <h2 style="text-align:center;">Voices Being Heard</h2>

  <div id="posts"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE"
);

async function loadPosts() {

  const { data, error } = await supabase
    .from('submissions')
    .select('*')
    .eq('status', 'approved');

  const container = document.getElementById('posts');
  container.innerHTML = "";

  if (error) {
    console.log("ERROR:", error);
    container.innerHTML = "<p style='text-align:center;'>Error loading posts</p>";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "<p style='text-align:center;'>No approved posts yet.</p>";
    return;
  }

  data.reverse().forEach(post => {
    const el = document.createElement('div');
    el.className = "card";

    el.innerHTML = `
      <div>${post.content}</div>
      <div class="author">
        ${post.anonymous ? "Anonymous" : (post.name || "")}
      </div>
    `;

    container.appendChild(el);
  });
}

loadPosts();
</script>

</body>
</html>
