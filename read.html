<!DOCTYPE html>
<html>
<head>
<title>Add Your Voice</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #ffe3ec, #e3f0ff);
  padding: 40px;
  text-align: center;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 15px;
  max-width: 600px;
  margin: auto;
}

textarea, input, select {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}

button {
  background: #ff4fa3;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Add Your Presence</h2>

  <textarea id="text"></textarea>
  <input id="name" placeholder="Name (optional)">

  <select id="tag">
    <option>Identity</option>
    <option>Family</option>
    <option>Healthcare</option>
    <option>Work</option>
    <option>Safety</option>
    <option>Affirmation</option>
  </select>

  <button onclick="submitVoice()">Submit</button>

  <p id="status"></p>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE"
);

async function submitVoice() {
  const { error } = await supabase.from("voices").insert([{
    text: text.value,
    name: name.value,
    tag: tag.value,
    status: "pending"
  }]);

  status.innerText = error ? error.message : "Submitted!";
}
</script>

</body>
</html>
