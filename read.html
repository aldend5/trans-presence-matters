<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read - Trans Presence Matters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #fdfbff 0%, #f7c6d9 50%, #a8d8f0 100%);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  color: #1a1a1a;
}

body::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
  animation: bubbleMove 30s linear infinite;
  z-index: 0;
}

@keyframes bubbleMove {
  0% { transform: translate(0,0) rotate(0deg); }
  100% { transform: translate(0,50px) rotate(360deg); }
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 60px 20px;
  position: relative;
  z-index: 1;
}

.nav {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
  justify-content: center;
  flex-wrap: wrap;
}

.nav a {
  text-decoration: none;
  opacity: 0.7;
  color: #1a1a1a;
}

.nav a:hover {
  opacity: 1;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 500;
}

.subtext {
  text-align: center;
  opacity: 0.7;
  margin-bottom: 30px;
  line-height: 1.5;
}

.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(16px);
  border-radius: 25px;
  padding: 25px;
  margin-bottom: 20px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.08);
}

.author {
  opacity: 0.6;
  font-size: 0.9rem;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="read.html">Read</a>
    <a href="submit.html">Share</a>
    <a href="comment.html">Comment</a>
  </div>

  <h2>Voices Being Heard</h2>

  <p class="subtext">
    Some voices arrive quietly. Some never get spoken at all.  
    What is shared here holds weight — and what is not shared does too.  
    Presence grows when it is witnessed.
  </p>

  <div id="posts"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
console.log("SCRIPT STARTED");

const supabaseUrl = "https://hpafnpfhlbgcreotgbzn.supabase.co";
const supabaseKey = "YOUR_KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadPosts() {
  console.log("LOADING POSTS");

  const { data, error } = await supabase
    .from('submissions')
    .select('*')
    .eq('status', 'approved');

  console.log("RESULT:", data, error);

  const container = document.getElementById('posts');
  container.innerHTML = "";

  if (error) {
    container.innerHTML = "<p>Error loading posts</p>";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No approved posts yet.</p>";
    return;
  }

  data.forEach(post => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <div>${post.content}</div>
      <div class="author">${post.anonymous ? "Anonymous" : post.name}</div>
    `;

    container.appendChild(el);
  });
}

loadPosts();
</script>

</body>
</html>
