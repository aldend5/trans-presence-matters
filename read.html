<!DOCTYPE html>
<html lang="en">
<head>

<body style="font-family: sans-serif; padding:20px;">

<h2>Read Page</h2>

<div id="posts">Loading...</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
console.log("SCRIPT START");

const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE"
);

async function loadPosts() {

  const container = document.getElementById('posts');

  try {
    console.log("Fetching...");

    const { data, error } = await supabase
      .from('submissions')
      .select('*'); // 🔥 NO FILTER FOR NOW

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if (error) {
      container.innerHTML = "ERROR: " + error.message;
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = "No data in table";
      return;
    }

    container.innerHTML = data.map(p => `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        ${p.content || "No content"}
      </div>
    `).join('');

  } catch (err) {
    console.log("CRASH:", err);
    container.innerHTML = "CRASH: " + err.message;
  }
}

loadPosts();
</script>

</body>
</html>
