<script>
console.log("JS START");
console.log("SUPABASE OBJECT:", window.supabase);
  console.log("READ PAGE LOADED");

const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE"
);

async function loadPosts() {

  const container = document.getElementById('posts');

  try {
    const response = await supabase
      .from('submissions')
      .select('*');

    console.log("FULL RESPONSE:", response);

    if (response.error) {
      container.innerHTML = "❌ Error: " + response.error.message;
      return;
    }

    if (!response.data || response.data.length === 0) {
      container.innerHTML = "⚠️ No data found";
      return;
    }

    container.innerHTML = response.data.map(p => `
      <div class="card">${p.content}</div>
    `).join('');

  } catch (err) {
    console.log("CRASH:", err);
    container.innerHTML = "💥 Crash: " + err.message;
  }
}

loadPosts();
</script>
