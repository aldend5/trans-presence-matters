<style>
body {

<body>
<div class="container">

<div class="nav">

<h2 style="text-align:center;">Voices Being Heard</h2>

<p style="text-align:center; opacity:0.7; margin-bottom:30px;">
Silence carries weight. Visibility shifts it.  
Each voice here holds presence — and invites witness.
</p>

<div id="posts"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
console.log("READ PAGE LOADED");

const supabaseUrl = "https://hpafnpfhlbgcreotgbzn.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE"; // 🔴 

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadPosts() {
  console.log("Fetching posts...");

  const { data: posts, error } = await supabase
    .from('submissions')
    .select('*')
    .eq('status', 'approved');

  console.log("POSTS:", posts, error);

  const container = document.getElementById('posts');
  container.innerHTML = "";

  if (error) {
    container.innerHTML = "<p style='text-align:center;'>Error loading posts</p>";
    return;
  }

  if (!posts || posts.length === 0) {
    container.innerHTML = "<p style='text-align:center;'>No approved posts yet.</p>";
    return;
  }

  for (let post of posts) {

    let likeCount = 0;

    try {
      const { count, error: likeError } = await supabase
        .from('likes')
        .select('*', { count: 'exact', head: true })
        .eq('submission_id', post.id);

      if (!likeError) {
        likeCount = count || 0;
      }
    } catch (err) {
      console.log("Like fetch failed:", err);
    }

    const el = document.createElement('div');
    el.className = "card";

    el.innerHTML = `
      <div>${post.content}</div>
      <div class="author">
        ${post.anonymous ? "Anonymous" : (post.name || "")}
      </div>

      <div class="like-section">
        ❤️ ${likeCount}
        <button onclick="likePost('${post.id}')">Like</button>
      </div>
    `;

    container.appendChild(el);
  }
}

async function likePost(id) {
  console.log("Liking post:", id);

  const { error } = await supabase
    .from('likes')
    .insert([{ submission_id: id }]);

  if (error) {
    alert("Could not like post");
    console.log(error);
    return;
  }

  loadPosts();
}

loadPosts();
</script>

</body>
