<!DOCTYPE html>
<html>
<head>
  <title>Read Voices</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      background: #f4f4f4;
      font-family: "Courier New", monospace;
      text-align: center;
      padding: 40px;
    }

    .entry {
      background: white;
      border: 2px solid black;
      margin: 20px auto;
      padding: 20px;
      max-width: 600px;
      position: relative;
    }

    .entry::before {
      content: "";
      position: absolute;
      top: -5px;
      left: -5px;
      width: 100%;
      height: 100%;
      border: 2px solid red;
      z-index: -1;
    }

    .meta {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>

<body>

<h2>VOICES</h2>

<div id="voices"></div>

<script>
const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE"
);

async function loadVoices() {
  const { data } = await supabase
    .from("voices")
    .select("*")
    .eq("status", "approved")
    .order("id", { ascending: false });

  const container = document.getElementById("voices");

  data.forEach(v => {
    container.innerHTML += `
      <div class="entry">
        <p>${v.text}</p>
        <div class="meta">— ${v.name || "anonymous"} | ${v.tag || ""}</div>
      </div>
    `;
  });
}

loadVoices();
</script>

</body>
</html>
