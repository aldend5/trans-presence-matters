<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read - Trans Presence Matters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #fdfbff 0%, #f7c6d9 50%, #a8d8f0 100%);
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 60px 20px;
}

.nav {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.nav a {
  text-decoration: none;
  opacity: 0.7;
  color: #1a1a1a;
}

.nav a:hover {
  opacity: 1;
}

.card {
  background: rgba(255,255,255,0.75);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 20px;
}

.author {
  opacity: 0.6;
  font-size: 0.9rem;
  margin-top: 10px;
}

.like-section {
  margin-top: 15px;
}

button {
  padding: 6px 12px;
  border: none;
  border-radius: 10px;
  background: #d46a9e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container">

<div class="nav">
<a href="index.html">Home</a>
<a href="read.html">Read</a>
<a href="submit.html">Share</a>
<a href="comment.html">Comment</a>
</div>

<h2 style="text-align:center;">Voices Being Heard</h2>

<p style="text-align:center; opacity:0.7; margin-bottom:30px;">
Silence carries weight. What is shared here resists that silence.  
Visibility is not passive — it reshapes what is allowed to exist.
</p>

<div id="posts"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://hpafnpfhlbgcreotgbzn.supabase.co";
const supabaseKey = "YOUR_ANON_KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadPosts() {

  const { data: posts, error } = await supabase
    .from('submissions')
    .select('*');

  const container = document.getElementById('posts');
  container.innerHTML = "";

  if (error) {
    console.log(error);
    container.innerHTML = "<p style='text-align:center;'>Error loading posts</p>";
    return;
  }

  if (!posts || posts.length === 0) {
    container.innerHTML = "<p style='text-align:center;'>No posts yet.</p>";
    return;
  }

  posts.reverse().forEach(post => {
    const el = document.createElement('div');
    el.className = "card";

    el.innerHTML = `
      <div>${post.content}</div>
      <div class="author">
        ${post.anonymous ? "Anonymous" : (post.name || "")}
      </div>
    `;

    container.appendChild(el);
  });
}

loadPosts();
</script>
</body>
</html>
