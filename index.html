<!DOCTYPE html>
<html>
<head>
<title>Add Your Presence</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(120deg, #fce3ec, #e3f0ff, #e9ffe3);
  color: #222;
}

/* NAV */
.nav {
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 15px;
  background: rgba(255,255,255,0.7);
}

.nav a {
  text-decoration: none;
  color: #444;
}

/* LAYOUT */
.container {
  max-width: 700px;
  margin: 60px auto;
  padding: 20px;
  text-align: center;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 16px;
  text-align: left;
}

/* TEXTAREA */
textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  transition: 0.2s;
}

textarea:focus {
  border-color: #ff4fa3;
  box-shadow: 0 0 10px rgba(255,79,163,0.2);
}

/* TAGS */
.tags {
  margin-top: 10px;
}

.tag {
  display: inline-block;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 20px;
  border: 1px solid #ddd;
  cursor: pointer;
}

.tag.active {
  background: #ff4fa3;
  color: white;
}

/* BUTTON */
.button {
  margin-top: 15px;
  padding: 10px 18px;
  border-radius: 20px;
  background: #ff4fa3;
  color: white;
  border: none;
  cursor: pointer;
}

/* TEXT */
.helper {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
}

.prompt {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
}

/* SUCCESS */
.success {
  text-align: center;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="read.html">Voices</a>
  <a href="learn.html">Learn</a>
  <a href="submit.html">Add</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<h2>Add Your Presence</h2>

<div class="card" id="formCard">

<p class="helper">
No login. No tracking. Say what you need to.
</p>

<p class="prompt" id="promptText"></p>

<textarea id="text" rows="5" placeholder="Write your experience..."></textarea>

<p class="helper" onclick="showHelp()" style="cursor:pointer;">
I don’t know what to write
</p>

<div class="tags" id="tags">
  <span class="tag">Identity</span>
  <span class="tag">Family</span>
  <span class="tag">Healthcare</span>
  <span class="tag">Work</span>
  <span class="tag">Safety</span>
  <span class="tag">Joy</span>
</div>

<button class="button" onclick="submitVoice()">Submit</button>

<p id="status" class="helper"></p>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwYWZucGZobGJnY3Jlb3RnYnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDA4ODMsImV4cCI6MjA5MDUxNjg4M30.Djb1u8uujkFSRlXA7IfUBbDnMvLMCFx083dQRqKGmsE"
);

/* PROMPTS */
const prompts = [
  "When did you feel unseen?",
  "What do people misunderstand?",
  "What changed for you recently?",
  "What do you wish others understood?"
];

let i = 0;
function rotatePrompt() {
  document.getElementById("promptText").innerText = prompts[i];
  i = (i + 1) % prompts.length;
}
setInterval(rotatePrompt, 4000);
rotatePrompt();

/* HELP */
function showHelp() {
  document.getElementById("text").value =
    "I remember a moment when...\n\nIt made me feel...\n\nWhat I wish people understood is...";
}

/* TAG SELECT */
let selectedTag = "";

document.querySelectorAll(".tag").forEach(tag => {
  tag.onclick = () => {
    document.querySelectorAll(".tag").forEach(t => t.classList.remove("active"));
    tag.classList.add("active");
    selectedTag = tag.innerText;
  };
});

/* SUBMIT */
async function submitVoice() {
  const content = document.getElementById("text").value;

  if (!content) {
    document.getElementById("status").innerText = "Write something first.";
    return;
  }

  const { error } = await supabase.from("voices").insert([{
    text: content,
    tag: selectedTag,
    status: "pending"
  }]);

  if (error) {
    document.getElementById("status").innerText = error.message;
  } else {
    document.getElementById("formCard").innerHTML =
      "<div class='success'>Your voice is now part of this space.</div>";
  }
}
</script>

</body>
</html>
