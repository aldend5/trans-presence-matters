<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trans Presence Matters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #fdfbff, #f7c6d9, #a8d8f0);
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 60px 20px;
}

.nav {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 40px;
}

.card {
  background: rgba(255,255,255,0.85);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 25px;
}

.author {
  opacity: 0.6;
  font-size: 0.9rem;
  margin-top: 10px;
}

.comment {
  margin-top: 10px;
  padding: 10px;
  background: rgba(0,0,0,0.03);
  border-radius: 10px;
}

textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  margin-top: 8px;
  padding: 6px 12px;
  border-radius: 10px;
  border: none;
  background: #d46a9e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="nav">
<a href="index.html">Home</a>
<a href="read.html">Read</a>
<a href="submit.html">Share</a>
</div>

<h2 style="text-align:center;">Stories & Responses</h2>

<div id="posts"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://hpafnpfhlbgcreotgbzn.supabase.co",
  "YOUR_ANON_KEY"
);

async function loadPosts() {

  const { data: posts, error } = await supabase
    .from('submissions')
    .select('*')
    .eq('status', 'approved');

  const container = document.getElementById('posts');
  container.innerHTML = "";

  if (error) {
    console.log(error);
    container.innerHTML = "<p>Error loading posts</p>";
    return;
  }

  for (let post of posts.reverse()) {

    // likes
    const { data: likes } = await supabase
      .from('submission_likes')
      .select('*')
      .eq('submission_id', post.id);

    // comments
    const { data: comments } = await supabase
      .from('comments')
      .select('*')
      .eq('submission_id', post.id)
      .eq('status', 'approved');

    const el = document.createElement('div');
    el.className = "card";

    el.innerHTML = `
      <div>${post.content}</div>

      <div class="author">
        ${post.anonymous ? "Anonymous" : (post.name || "")}
      </div>

      <div>
        ❤️ ${likes ? likes.length : 0}
        <button onclick="likePost('${post.id}')">Like</button>
      </div>

      <div>
        ${(comments || []).map(c => `
          <div class="comment">${c.content}</div>
        `).join("")}
      </div>

      <form onsubmit="addComment(event, '${post.id}')">
        <textarea placeholder="Respond..." required></textarea>
        <button type="submit">Reply</button>
      </form>
    `;

    container.appendChild(el);
  }
}

async function likePost(id) {
  await supabase.from('submission_likes').insert([{ submission_id: id }]);
  loadPosts();
}

async function addComment(e, postId) {
  e.preventDefault();

  const content = e.target.querySelector('textarea').value;

  await supabase.from('comments').insert([{
    submission_id: postId,
    content: content,
    status: "pending"
  }]);

  e.target.reset();
}

loadPosts();
</script>

</body>
</html>
